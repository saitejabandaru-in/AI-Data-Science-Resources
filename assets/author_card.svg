<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 260" width="100%" height="260" style="border-radius: 12px; font-family: 'Inter', system-ui, -apple-system, sans-serif;">
  <defs>
    <!-- Gradients -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C2B36" />
      <stop offset="100%" stop-color="#0D1B2A" />
    </linearGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F7CAC" />
      <stop offset="100%" stop-color="#99E2B4" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="850" height="260" rx="12" fill="url(#cardGrad)" stroke="#2C3E50" stroke-width="1.5"/>

  <!-- Geometric elements -->
  <path d="M 650 0 L 850 120 L 850 0 Z" fill="#4F7CAC" fill-opacity="0.07" />
  <circle cx="800" cy="200" r="70" fill="#99E2B4" fill-opacity="0.04" filter="url(#glow)" />
  <circle cx="110" cy="130" r="80" fill="#4F7CAC" fill-opacity="0.08" filter="url(#glow)" />

  <!-- Avatar Circle with Network Graph -->
  <g transform="translate(60, 65)">
    <!-- Outer Ring -->
    <circle cx="65" cy="65" r="62" fill="none" stroke="url(#primaryGrad)" stroke-width="2.5" stroke-dasharray="12 6 18 6"/>
    <!-- Inner Base -->
    <circle cx="65" cy="65" r="54" fill="#15222E" />
    
    <!-- Abstract AI/Graph Node illustration -->
    <!-- Central Node -->
    <circle cx="65" cy="65" r="8" fill="#99E2B4" />
    <!-- Connecting Nodes -->
    <circle cx="45" cy="40" r="5" fill="#4F7CAC" />
    <circle cx="85" cy="40" r="5" fill="#4F7CAC" />
    <circle cx="35" cy="75" r="5" fill="#4F7CAC" />
    <circle cx="95" cy="75" r="5" fill="#4F7CAC" />
    <circle cx="65" cy="100" r="6" fill="#4F7CAC" />
    
    <!-- Edge lines -->
    <line x1="65" y1="65" x2="45" y2="40" stroke="#4F7CAC" stroke-width="1.5" stroke-opacity="0.6" />
    <line x1="65" y1="65" x2="85" y2="40" stroke="#4F7CAC" stroke-width="1.5" stroke-opacity="0.6" />
    <line x1="65" y1="65" x2="35" y2="75" stroke="#4F7CAC" stroke-width="1.5" stroke-opacity="0.6" />
    <line x1="65" y1="65" x2="95" y2="75" stroke="#4F7CAC" stroke-width="1.5" stroke-opacity="0.6" />
    <line x1="65" y1="65" x2="65" y2="100" stroke="#4F7CAC" stroke-width="1.5" stroke-opacity="0.6" />
    
    <!-- Small outer connection points -->
    <circle cx="45" cy="40" r="2" fill="#E6EEF3" />
    <circle cx="85" cy="40" r="2" fill="#E6EEF3" />
    <circle cx="35" cy="75" r="2" fill="#E6EEF3" />
    <circle cx="95" cy="75" r="2" fill="#E6EEF3" />
    <circle cx="65" cy="100" r="2" fill="#E6EEF3" />
  </g>

  <!-- Author Details -->
  <!-- Name -->
  <text x="210" y="75" font-size="28" font-weight="800" fill="#E6EEF3" letter-spacing="0.5">Sai Teja Bandaru</text>
  
  <!-- Role/Title -->
  <text x="210" y="105" font-size="16" font-weight="600" fill="url(#primaryGrad)">Data Scientist &amp; AI Researcher</text>
  
  <!-- Brief Bio / Subtext -->
  <text x="210" y="138" font-size="13.5" font-weight="400" fill="#A0AAB2">Translating statistical theory into interpretable and robust clinical AI models.</text>
  <text x="210" y="156" font-size="13.5" font-weight="400" fill="#A0AAB2">Permutation-based Nonparametric Inference • Explainable AI • Clinical Data Science</text>

  <!-- Quick Info Badges -->
  <g transform="translate(210, 192)" font-size="12.5" font-weight="500">
    <!-- Email -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="230" height="30" rx="6" fill="#1A2D3C" stroke="#253E54" stroke-width="1" />
      <text x="12" y="19" fill="#99E2B4" font-weight="bold">✉</text>
      <text x="32" y="19" fill="#E6EEF3">Saitejaroyal2311@gmail.com</text>
    </g>
    <!-- Website -->
    <g transform="translate(245, 0)">
      <rect x="0" y="0" width="180" height="30" rx="6" fill="#1A2D3C" stroke="#253E54" stroke-width="1" />
      <text x="12" y="19" fill="#4F7CAC" font-weight="bold">🌐</text>
      <text x="32" y="19" fill="#E6EEF3">saitejabandaru.com</text>
    </g>
    <!-- GitHub -->
    <g transform="translate(440, 0)">
      <rect x="0" y="0" width="180" height="30" rx="6" fill="#1A2D3C" stroke="#253E54" stroke-width="1" />
      <text x="12" y="19" fill="#E6EEF3" font-weight="bold">🐙</text>
      <text x="32" y="19" fill="#E6EEF3">saitejabandaru-in</text>
    </g>
  </g>
</svg>
